<!doctype html>
<html>
    <head>
        <style>
            .form{
        width: 500px;
         padding: 25px 35px;
        background:navy;
        border-radius: 10px;
            }
              .form input{
        width: 50%;
        height: 25px;

        border-radius: 5px;

              }
              .form label
              {
                    color: #f8f8f9;

              }
              .form h1{
                color: #f8f8f9;
              }
              .into button{
        width: 20%;
        height: 50px;
        background: #494eea;
        color: #fff;
        border: 0;
        outline: 0;
        border-radius: 5px;

    }
     .form button{

        height: 50px;

     }

    </head>
    <body>
       <center> <div class="form">

 </div></center>

</html>
